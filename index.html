<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hakuba Summer Guide</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07150f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: pan-y;
    }
    .app {
      position: fixed;
      inset: 0;
      background: #07150f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .track {
      height: 100%;
      width: 100%;
      display: flex;
      transition: transform 260ms ease;
      will-change: transform;
    }
    .page {
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #07150f;
      overflow: hidden;
    }
    .page img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      background: #07150f;
    }
    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 64px;
      border: none;
      border-radius: 999px;
      background: rgba(0,0,0,.32);
      color: white;
      font-size: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .prev { left: 10px; }
    .next { right: 10px; }
    .counter {
      position: fixed;
      left: 50%;
      bottom: calc(14px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      padding: 6px 13px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      color: white;
      font-size: 14px;
      z-index: 10;
      letter-spacing: .03em;
    }
    .hint {
      position: fixed;
      left: 50%;
      top: calc(12px + env(safe-area-inset-top));
      transform: translateX(-50%);
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.40);
      color: rgba(255,255,255,.92);
      font-size: 13px;
      z-index: 10;
      opacity: 1;
      transition: opacity 600ms ease;
      white-space: nowrap;
    }
    .hint.hide { opacity: 0; pointer-events: none; }
    @media (min-width: 700px) {
      .page img { width: auto; height: 100vh; max-width: 100vw; }
      .nav { width: 52px; height: 74px; font-size: 42px; }
      .prev { left: 24px; }
      .next { right: 24px; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Hakuba Summer Guide">
    <div class="track" id="track">
      <section class="page"><img src="1.png" alt="Page 1" /></section>
      <section class="page"><img src="2.png" alt="Page 2" /></section>
      <section class="page"><img src="3.png" alt="Page 3" /></section>
      <section class="page"><img src="4.png" alt="Page 4" /></section>
      <section class="page"><img src="5.png" alt="Page 5" /></section>
      <section class="page"><img src="6.png" alt="Page 6" /></section>
      <section class="page"><img src="7.png" alt="Page 7" /></section>
    </div>
    <button class="nav prev" id="prev" aria-label="Previous page">‹</button>
    <button class="nav next" id="next" aria-label="Next page">›</button>
    <div class="hint" id="hint">Swipe left / right</div>
    <div class="counter" id="counter">1 / 7</div>
  </main>
  <script>
    const total = 7;
    let current = 0;
    const track = document.getElementById('track');
    const counter = document.getElementById('counter');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const hint = document.getElementById('hint');

    function update() {
      track.style.transform = `translateX(${-current * 100}%)`;
      counter.textContent = `${current + 1} / ${total}`;
      prev.style.display = current === 0 ? 'none' : 'flex';
      next.style.display = current === total - 1 ? 'none' : 'flex';
      setTimeout(() => hint.classList.add('hide'), 1600);
    }
    function go(n) {
      current = Math.max(0, Math.min(total - 1, n));
      update();
    }
    prev.addEventListener('click', () => go(current - 1));
    next.addEventListener('click', () => go(current + 1));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') go(current - 1);
      if (e.key === 'ArrowRight') go(current + 1);
    });

    let startX = 0, startY = 0, touching = false;
    document.addEventListener('touchstart', (e) => {
      if (!e.touches.length) return;
      touching = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (!touching || !e.changedTouches.length) return;
      touching = false;
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) go(current + 1);
        else go(current - 1);
      }
    }, { passive: true });

    let mouseDown = false, mouseStartX = 0;
    document.addEventListener('mousedown', (e) => {
      mouseDown = true;
      mouseStartX = e.clientX;
    });
    document.addEventListener('mouseup', (e) => {
      if (!mouseDown) return;
      mouseDown = false;
      const dx = e.clientX - mouseStartX;
      if (Math.abs(dx) > 70) {
        if (dx < 0) go(current + 1);
        else go(current - 1);
      }
    });
    update();
  </script>
</body>
</html>
