<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover the Japanese Northern Alps</title>

<style>
body{
    margin:0;
    background:#08150f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#viewer{
    max-width:100vw;
    max-height:100vh;
    object-fit:contain;
}

.nav{
    display:none;
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:36px;
    cursor:pointer;
}

#prev{left:20px;}
#next{right:20px;}

#counter{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,.55);
    color:#fff;
    padding:8px 16px;
    border-radius:20px;
    font-size:18px;
}
</style>
</head>

<body>

<button id="prev" class="nav">&#10094;</button>

<img id="viewer" src="1.png">

<button id="next" class="nav">&#10095;</button>

<div id="counter"></div>

<script>

const pages=[
"1.png",
"2.png",
"3.png",
"4.png",
"5.png",
"6.png",
"7.png",
"8.png"
];

let current=0;

const img=document.getElementById("viewer");
const counter=document.getElementById("counter");

function showPage(){
    img.src=pages[current];
    counter.innerHTML=(current+1)+" / "+pages.length;
}

document.getElementById("next").onclick=function(){
    current=(current+1)%pages.length;
    showPage();
}

document.getElementById("prev").onclick=function(){
    current=(current-1+pages.length)%pages.length;
    showPage();
}

document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight"){
        current=(current+1)%pages.length;
        showPage();
    }
    if(e.key==="ArrowLeft"){
        current=(current-1+pages.length)%pages.length;
        showPage();
    }
});

showPage();

</script>

</body>
</html>
